<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SourceMate — карточка источника</title>
    <meta name="description" content="Карточка источника SourceMate.">
    <link rel="stylesheet" href="./cabinet.css">
    <link rel="prefetch" href="./cabinet.html">
    <link rel="prefetch" href="./cabinet.js">
    <link rel="prefetch" href="./report.html">
    <link rel="prefetch" href="./report.js">
    <link rel="prefetch" href="./subscription.html">
    <link rel="prefetch" href="./subscription.js">
  </head>
  <body>
    <main class="cabinet-page is-loading">
      <div class="cabinet-bg bg-left"></div>
      <div class="cabinet-bg bg-right"></div>
      <div class="cabinet-bg bg-bottom"></div>

      <div class="cabinet-shell">
        <header class="cabinet-nav" aria-label="Навигация личного кабинета">
          <a class="cabinet-brand" href="./index.html" aria-label="SourceMate">
            <span class="brand-mark"></span>
            <strong>SourceMate</strong>
          </a>

          <nav class="cabinet-menu" aria-label="Разделы">
            <a href="./cabinet.html?settings=1">Настройки</a>
            <a href="./subscription.html">Подписка</a>
          </nav>

          <button class="cabinet-support" type="button">Поддержка</button>
        </header>

        <section class="report-detail" data-source-detail>
          <section class="empty-history report-loading">
            <h3>Загружаем источник</h3>
            <p>SourceMate подготавливает карточку публикации.</p>
          </section>
        </section>
      </div>
    </main>

    <script src="./settings-modal.js"></script>
    <script src="./source.js"></script>
    <script src="./support.js"></script>
  </body>
</html>
